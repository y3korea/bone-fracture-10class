<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🦴 Bone Fracture Classifier — Web</title>
<style>
  :root {
    --bg:#0b1220; --panel:#111a2e; --fg:#e8ecf3; --muted:#8a97b0;
    --accent:#4285F4; --good:#34A853; --warn:#FBBC04; --bad:#EA4335;
    --border:#1f2a44;
  }
  * { box-sizing:border-box; }
  body {
    margin:0; font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(180deg,#0a0f1e 0%,#0b1220 100%);
    color:var(--fg); min-height:100vh;
  }
  header {
    padding:20px 32px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap;
  }
  header h1 { margin:0; font-size:20px; font-weight:600; }
  header .meta { font-size:12px; color:var(--muted); }
  main {
    max-width:1100px; margin:28px auto; padding:0 24px;
    display:grid; grid-template-columns:1fr 1fr; gap:24px;
  }
  @media (max-width: 820px) { main { grid-template-columns:1fr; } }
  .card {
    background:var(--panel); border:1px solid var(--border);
    border-radius:12px; padding:20px;
  }
  .card h2 { margin:0 0 14px; font-size:15px; color:var(--muted); font-weight:500; }
  .drop {
    border:2px dashed #2a3960; border-radius:10px; padding:28px;
    text-align:center; cursor:pointer; transition:all .2s;
  }
  .drop:hover, .drop.dragover { border-color:var(--accent); background:#0d1730; }
  .drop p { margin:8px 0 0; color:var(--muted); font-size:13px; }
  .drop .big { font-size:32px; }
  input[type=file] { display:none; }
  .preview {
    margin-top:14px; max-width:100%; max-height:340px; border-radius:8px;
    display:none; background:#000;
  }
  .controls { margin-top:14px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  label.toggle { display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--muted); cursor:pointer; user-select:none; }
  button {
    background:var(--accent); color:white; border:none;
    padding:10px 18px; border-radius:8px; cursor:pointer; font-size:14px;
    font-weight:500; transition:filter .15s;
  }
  button:hover:not(:disabled) { filter:brightness(1.15); }
  button:disabled { opacity:.4; cursor:not-allowed; }
  #result { min-height:120px; }
  .top-pred {
    padding:14px 16px; border-radius:8px;
    background:linear-gradient(90deg,#132243,#0b1732);
    border:1px solid var(--border); margin-bottom:14px;
  }
  .top-pred .label { font-size:12px; color:var(--muted); }
  .top-pred .value { font-size:22px; font-weight:600; margin-top:2px; }
  .top-pred .conf { font-size:13px; color:var(--muted); margin-top:4px; }
  .bars { display:flex; flex-direction:column; gap:6px; }
  .bar {
    display:grid; grid-template-columns: 170px 1fr 56px; align-items:center; gap:10px;
    font-size:12px;
  }
  .bar .name { color:var(--fg); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .bar .track { background:#0b1631; border-radius:4px; height:10px; overflow:hidden; border:1px solid var(--border); }
  .bar .fill { height:100%; background:#4285F4; transition:width .4s; }
  .bar.top .fill { background:var(--good); }
  .bar .pct { text-align:right; color:var(--muted); font-variant-numeric:tabular-nums; }
  .status { color:var(--muted); font-size:12px; margin-top:10px; }
  .err { color:var(--bad); }
  .chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .chip {
    padding:3px 8px; border-radius:12px; font-size:11px;
    background:#0c1832; border:1px solid var(--border); color:var(--muted);
  }
  footer { text-align:center; padding:24px; color:var(--muted); font-size:11px; }
  pre { overflow:auto; font-size:11px; color:#9cb0d8; background:#0b1530; padding:10px; border-radius:6px; border:1px solid var(--border); }
  .loader {
    display:inline-block; width:12px; height:12px; border:2px solid var(--border);
    border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite;
    vertical-align:middle; margin-right:6px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  a { color:var(--accent); text-decoration:none; }
  a:hover { text-decoration:underline; }
</style>
</head>
<body>

<header>
  <h1>🦴 Bone Fracture Classifier</h1>
  <div class="meta" id="modelBadge"><span class="loader"></span>loading model info…</div>
</header>

<main>
  <section class="card">
    <h2>1. 이미지 업로드</h2>
    <label for="fileInput" class="drop" id="drop">
      <div class="big">📷</div>
      <div>클릭 또는 드래그 앤 드롭</div>
      <p>지원 포맷: JPG · PNG · WebP · BMP · TIFF</p>
    </label>
    <input type="file" id="fileInput" accept="image/*" />
    <img class="preview" id="preview" alt="" />
    <div class="controls">
      <label class="toggle">
        <input type="checkbox" id="ttaToggle" checked />
        TTA 사용 (5× 변환 평균 — 약간 느리지만 정확도 ↑)
      </label>
      <button id="runBtn" disabled>🔍 예측</button>
    </div>
    <div class="status" id="status">이미지를 선택하면 예측이 활성화됩니다.</div>
  </section>

  <section class="card">
    <h2>2. 예측 결과</h2>
    <div id="result"><em style="color:var(--muted); font-size:13px;">아직 예측 결과가 없습니다.</em></div>
  </section>

  <section class="card" style="grid-column:1/-1;">
    <h2>📊 모델 정보</h2>
    <div id="modelInfo"><span class="loader"></span> loading…</div>
  </section>
</main>

<footer>
  PyTorch / timm → ONNX Runtime Web · in-browser inference · 교육용 데모<br>
  Source: <a href="https://github.com/y3korea/bone-fracture-10class">github.com/y3korea/bone-fracture-10class</a>
</footer>

<!-- ONNX Runtime Web (relative to docs/web/, files live at docs/ort/) -->
<script src="../ort/ort.min.js"></script>
<script>
/*
 * Bone Fracture Classifier — Web (client-side ONNX inference)
 * Original FastAPI-server UI from web/static/index.html, with backend
 * /api/predict + /api/info calls replaced by onnxruntime-web running
 * entirely in the browser. Hosted on GitHub Pages.
 *
 * Asset layout (relative to this file, docs/web/index.html):
 *   ../ort/                 ← ORT WASM + ort.min.js
 *   ../model.onnx           ← MobileNetV2 ONNX model
 *   ../metadata.json        ← class names + normalize stats + test metrics
 */
(() => {
  'use strict';

  /* ── DOM ─────────────────────────────────────────────── */
  const $ = sel => document.querySelector(sel);
  const drop = $('#drop'),
        fileInput = $('#fileInput'),
        preview = $('#preview'),
        runBtn = $('#runBtn'),
        statusEl = $('#status'),
        resultEl = $('#result'),
        ttaToggle = $('#ttaToggle'),
        modelBadge = $('#modelBadge'),
        modelInfoEl = $('#modelInfo');

  /* ── 상태 ────────────────────────────────────────────── */
  let META = null;
  let SESSION = null;
  let selectedFile = null;
  let lastBitmap = null;

  /* ── 초기화 ──────────────────────────────────────────── */
  async function init() {
    try {
      if (typeof ort === 'undefined') throw new Error('onnxruntime-web 미로드 — ../ort/ort.min.js 확인');

      // Resolve WASM relative to docs/ root, not docs/web/
      ort.env.wasm.wasmPaths = new URL('../ort/', document.baseURI).href;
      ort.env.wasm.numThreads = 1;
      ort.env.wasm.simd = true;

      const t0 = performance.now();
      const metaRes = await fetch('../metadata.json', { cache: 'no-cache' });
      if (!metaRes.ok) throw new Error(`metadata.json 로드 실패 (${metaRes.status})`);
      META = await metaRes.json();

      SESSION = await ort.InferenceSession.create('../model.onnx', {
        executionProviders: ['wasm'],
        graphOptimizationLevel: 'all',
      });
      const dt = performance.now() - t0;

      META._inName  = SESSION.inputNames[0]  || 'input';
      META._outName = SESSION.outputNames[0] || 'logits';

      modelBadge.textContent =
        `${META.model_label || META.model_name}  ·  ${META.img_size}px  ·  ` +
        `${META.class_names.length} classes  ·  loaded ${(dt/1000).toFixed(1)}s`;
      renderInfo();
      statusEl.textContent = '이미지를 선택하면 예측이 활성화됩니다.';
    } catch (e) {
      console.error(e);
      modelBadge.innerHTML = `<span class="err">모델 로딩 실패: ${e.message}</span>`;
      statusEl.innerHTML  = `<span class="err">${e.message}</span>`;
    }
  }

  /* ── 모델 정보 카드 ───────────────────────────────────── */
  function renderInfo() {
    const m = META;
    const f1 = m.per_class_f1_tta || {};
    const sup = m.per_class_support || {};
    const acc = m.per_class_acc || {};
    const tm = m.test_metrics || {};

    // Per-class table — prefer F1 (TTA) if present, otherwise show per_class_acc
    const usingF1 = Object.keys(f1).length > 0;
    const perClassSource = usingF1 ? f1 : acc;
    const rows = Object.entries(perClassSource).map(([cls, val]) =>
      `<tr>
         <td style="padding:4px 10px;">${cls}</td>
         <td style="padding:4px 10px; text-align:right; font-variant-numeric:tabular-nums;">${Number(val).toFixed(1)}%</td>
         ${usingF1 && sup[cls] != null
           ? `<td style="padding:4px 10px; text-align:right; color:var(--muted);">n=${sup[cls]}</td>`
           : ''}
       </tr>`
    ).join('');

    // Metric tiles — only render metrics that actually exist in metadata.json
    const tiles = [];
    const accSimple = tm.acc_simple ?? m.test_acc_simple;
    const accTta    = tm.acc_tta ?? m.test_acc_tta;
    const valAcc    = m.best_val_acc;
    const f1Simple  = tm.f1_macro_simple ?? m.test_f1_macro_simple;
    const f1Tta     = tm.f1_macro_tta ?? m.test_f1_macro_tta;
    const f1WTta    = tm.f1_weighted_tta ?? m.test_f1_weighted_tta;
    function tile(label, value, color) {
      if (value == null) return '';
      return `<div>
        <div style="color:var(--muted); font-size:11px;">${label}</div>
        <div style="font-size:18px; font-weight:600; ${color ? 'color:' + color : ''}">${Number(value).toFixed(2)}%</div>
      </div>`;
    }
    tiles.push(tile('Test Acc (raw)', accSimple));
    tiles.push(tile('Test Acc (TTA)', accTta));
    tiles.push(tile('Best Val Acc',   valAcc));
    tiles.push(tile('F1 macro (raw)', f1Simple));
    tiles.push(tile('F1 macro (TTA)', f1Tta, 'var(--good)'));
    tiles.push(tile('F1 weighted (TTA)', f1WTta));
    const tilesHtml = tiles.filter(Boolean).join('');

    modelInfoEl.innerHTML = `
      <div class="chips">
        <span class="chip">model: ${m.model_name}</span>
        <span class="chip">IMG ${m.img_size}</span>
        <span class="chip">runtime: onnxruntime-web (wasm)</span>
        <span class="chip">classes: ${m.class_names.length}</span>
        ${m.source_run ? `<span class="chip">run: ${m.source_run}</span>` : ''}
      </div>
      ${tilesHtml ? `<div style="margin-top:14px; display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px;">${tilesHtml}</div>` : ''}
      ${rows ? `<details style="margin-top:16px;">
        <summary style="cursor:pointer; color:var(--muted); font-size:12px;">
          ${usingF1 ? 'per-class F1 (TTA) 보기' : 'per-class accuracy 보기'}
        </summary>
        <table style="width:100%; margin-top:10px; font-size:12px; border-collapse:collapse;">${rows}</table>
      </details>` : ''}
    `;
  }

  /* ── 드래그 앤 드롭 ────────────────────────────────────── */
  ['dragenter', 'dragover'].forEach(ev =>
    drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('dragover'); })
  );
  ['dragleave', 'drop'].forEach(ev =>
    drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('dragover'); })
  );
  drop.addEventListener('drop', e => {
    const f = e.dataTransfer?.files?.[0]; if (f) handleFile(f);
  });
  fileInput.addEventListener('change', e => {
    const f = e.target.files?.[0]; if (f) handleFile(f);
  });

  async function handleFile(f) {
    if (!f.type?.startsWith('image/')) {
      statusEl.textContent = '이미지 파일만 업로드 가능합니다.';
      statusEl.classList.add('err'); return;
    }
    selectedFile = f;
    statusEl.classList.remove('err');
    statusEl.textContent = `${f.name} (${(f.size/1024).toFixed(1)} KB)`;
    const url = URL.createObjectURL(f);
    preview.src = url; preview.style.display = 'block';
    try {
      lastBitmap = await createImageBitmap(f);
    } catch (e) {
      lastBitmap = await new Promise((ok, ng) => {
        const img = new Image();
        img.onload = () => ok(img);
        img.onerror = () => ng(new Error('이미지 디코딩 실패'));
        img.src = url;
      });
    }
    runBtn.disabled = !SESSION;
  }

  /* ── 전처리 ──────────────────────────────────────────── */
  function imageToTensor(bitmap, size, mean, std, transforms = null) {
    const t = transforms || {};
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    ctx.save();
    ctx.translate(size / 2, size / 2);
    if (t.rotateDeg) ctx.rotate(t.rotateDeg * Math.PI / 180);
    const drawScale = t.scale || 1;
    if (t.hflip) ctx.scale(-drawScale, drawScale); else ctx.scale(drawScale, drawScale);
    ctx.drawImage(bitmap, -size / 2, -size / 2, size, size);
    ctx.restore();

    const { data } = ctx.getImageData(0, 0, size, size);
    const N = size * size;
    const out = new Float32Array(3 * N);
    for (let i = 0; i < N; i++) {
      const r = data[i*4    ] / 255;
      const g = data[i*4 + 1] / 255;
      const b = data[i*4 + 2] / 255;
      out[i        ] = (r - mean[0]) / std[0];
      out[i + N    ] = (g - mean[1]) / std[1];
      out[i + 2*N  ] = (b - mean[2]) / std[2];
    }
    return out;
  }

  function softmax(arr) {
    let max = -Infinity;
    for (let i = 0; i < arr.length; i++) if (arr[i] > max) max = arr[i];
    const exps = new Float32Array(arr.length);
    let sum = 0;
    for (let i = 0; i < arr.length; i++) { exps[i] = Math.exp(arr[i] - max); sum += exps[i]; }
    for (let i = 0; i < arr.length; i++) exps[i] /= sum;
    return exps;
  }

  /* ── 예측 (TTA 평균) ───────────────────────────────────── */
  runBtn.addEventListener('click', async () => {
    if (!SESSION || !lastBitmap) return;
    runBtn.disabled = true;
    statusEl.classList.remove('err');
    statusEl.innerHTML = '<span class="loader"></span> 추론 중…';
    resultEl.innerHTML = '<em style="color:var(--muted); font-size:13px;">처리 중…</em>';

    const size = META.img_size;
    const mean = META.normalize_mean;
    const std  = META.normalize_std;
    const inName = META._inName;
    const numClasses = META.class_names.length;

    const transformsList = ttaToggle.checked
      ? [
          {},
          { hflip: true },
          { scale: 1.15 },
          { rotateDeg: 10 },
          { rotateDeg: -10 },
        ]
      : [{}];

    const t0 = performance.now();
    try {
      const probsAccum = new Float32Array(numClasses);
      for (const tf of transformsList) {
        const inputArr = imageToTensor(lastBitmap, size, mean, std, tf);
        const tensor = new ort.Tensor('float32', inputArr, [1, 3, size, size]);
        const out = await SESSION.run({ [inName]: tensor });
        const outName = Object.keys(out)[0];
        const logits = out[outName].data;
        const probs = softmax(logits);
        for (let i = 0; i < numClasses; i++) probsAccum[i] += probs[i];
      }
      for (let i = 0; i < numClasses; i++) probsAccum[i] /= transformsList.length;

      const dt = performance.now() - t0;
      const order = Array.from(probsAccum.keys()).sort((a, b) => probsAccum[b] - probsAccum[a]);
      renderResult(order, probsAccum, dt, transformsList.length > 1);
      statusEl.textContent = `✅ 완료 (${dt.toFixed(0)}ms · ${transformsList.length}× 추론, 클라이언트)`;
    } catch (e) {
      console.error(e);
      statusEl.textContent = '에러: ' + e.message;
      statusEl.classList.add('err');
      resultEl.innerHTML = '<span class="err">예측 실패</span>';
    } finally {
      runBtn.disabled = false;
    }
  });

  /* ── 결과 렌더 ───────────────────────────────────────── */
  function renderResult(order, probs, ms, ttaUsed) {
    const names = META.class_names;
    const topI = order[0];
    const topPct = probs[topI] * 100;
    const color =
      topPct > 70 ? 'var(--good)' :
      topPct > 40 ? 'var(--warn)' : 'var(--bad)';
    const confLabel =
      topPct <= 40 ? '— 불확실 (저신뢰)' :
      topPct >= 70 ? '— 높음' : '— 중간';

    let html = `
      <div class="top-pred">
        <div class="label">🏆 TOP-1 예측${ttaUsed ? ' · TTA' : ''}</div>
        <div class="value">${escapeHtml(names[topI])}</div>
        <div class="conf" style="color:${color};">
          신뢰도 ${topPct.toFixed(1)}% ${confLabel}
        </div>
      </div>
      <div class="bars">`;
    const maxPct = Math.max(...order.map(i => probs[i])) * 100 || 1;
    order.forEach((i, rank) => {
      const pct = probs[i] * 100;
      const w = (pct / maxPct * 100).toFixed(2);
      html += `
        <div class="bar ${rank === 0 ? 'top' : ''}">
          <div class="name">${escapeHtml(names[i])}</div>
          <div class="track"><div class="fill" style="width:${w}%"></div></div>
          <div class="pct">${pct.toFixed(1)}%</div>
        </div>`;
    });
    html += '</div>';
    resultEl.innerHTML = html;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }

  document.addEventListener('DOMContentLoaded', init);
  if (document.readyState !== 'loading') init();
})();
</script>
</body>
</html>
